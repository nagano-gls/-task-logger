<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#1A1A2E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="aki-Cockpit"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="icon" href="favicon.ico" sizes="any"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>aki-Cockpit v3.0.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F8F7F4;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:60px}
.hdr{background:#1A1A2E;color:#E8E4DC;padding:0 1rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-title{font-size:18px;font-weight:500;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-attend{border:none;border-radius:20px;padding:8px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-attend:active{opacity:.7}
.btn-in{background:#22A06B;color:#fff}
.btn-out{background:#E05A5A;color:#fff}
.btn-in:disabled,.btn-out:disabled{opacity:.35;cursor:default}
.tabs{display:flex;background:#fff;border-bottom:1px solid #E5E2DA;position:sticky;top:60px;z-index:100}
.tab{flex:1;padding:14px 4px;font-size:14px;text-align:center;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}
.tab.on{color:#1A1A2E;border-bottom-color:#1A1A2E;font-weight:600}
.sec{padding:.75rem 1rem;max-width:960px;margin:0 auto}
.lbl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.template-btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tmpl-group-btn{background:#EEF0FF;color:#5A5FBE;border:1px solid #C8C5F0;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.tmpl-group-btn:hover{background:#E0E2FF}
textarea.ti{border:1px solid #DDD;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;color:#1A1A2E;outline:none;font-family:inherit;width:100%;resize:vertical;line-height:1.6;display:block}
textarea.ti:focus{border-color:#5A5FBE;box-shadow:0 0 0 2px rgba(90,95,190,.12)}
.badd{background:#1A1A2E;color:#E8E4DC;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.hint{font-size:11px;color:#5A5FBE;background:#EEF0FF;border-radius:5px;padding:3px 8px;margin-top:4px;display:none}
/* セクション */
.section-block{margin-bottom:8px;border-radius:10px;overflow:hidden;border:1px solid #E5E2DA}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;user-select:none;background:#fff}
.section-header:hover{background:#F7F6F4}
.section-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-count{font-size:11px;font-weight:400;color:#888;background:#F0EDE8;border-radius:20px;padding:1px 8px}
.section-arrow{font-size:10px;color:#BBB;transition:transform .2s}
.section-arrow.open{transform:rotate(180deg)}
.section-body{display:none;border-top:1px solid #F0EDE8}
.section-body.open{display:block}
/* タスク行 */
.task-list{display:flex;flex-direction:column}
.task-row{display:flex;align-items:center;gap:4px;padding:5px 8px;border-bottom:1px solid #F5F2EE;background:#fff;transition:background .15s}
.task-row.over-planned{background:repeating-linear-gradient(45deg,#fff8f8,#fff8f8 4px,#ffe8e8 4px,#ffe8e8 8px);}
.task-rec-history{background:#F8F7FF;border-top:1px solid #E0DEFF;padding:8px 10px;font-size:11px;max-height:160px;overflow-y:auto;}
.task-rec-item{padding:4px 0;border-bottom:1px solid #F0EDE8;color:#555;line-height:1.5;}
.task-rec-item:last-child{border-bottom:none}
.task-rec-time{color:#5A5FBE;font-weight:600;margin-right:6px;}
.later-section{background:#FFF8EC;border:1px solid #F5D38A;border-radius:10px;margin-bottom:10px;overflow:hidden;}
.later-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;background:#FFF8EC;}
.later-item{display:flex;align-items:center;gap:8px;padding:7px 14px;border-top:1px solid #F5D38A;font-size:13px;}
.later-item-text{flex:1;min-width:0;}
.later-item-time{font-size:10px;color:#B46B00;white-space:nowrap;}
.btn-clock{border:1px solid #DDD;background:#F8F7F4;color:#555;border-radius:6px;padding:4px 7px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-clock.active{background:#FFF3CD;color:#856404;border-color:#FFE69C;font-weight:600;}
.ai-tool-btn{border:1px solid #C8C5F0;background:#F5F3FF;color:#5A5FBE;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;}
.ai-tool-btn.sel{background:#5A5FBE;color:#fff;border-color:#5A5FBE;}
.ai-tool-btn-sm{border:1px solid #C8C5F0;background:#F5F3FF;color:#5A5FBE;border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:500;}
.ai-tool-btn-sm.sel{background:#5A5FBE;color:#fff;border-color:#5A5FBE;}
.ai-tag{display:inline-block;background:#EDE9FF;color:#7C3AED;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:600;margin-left:5px;}
.future-badge{display:inline-block;background:#EFF6FF;color:#0369A1;border:1px solid #BAE6FD;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;margin-left:4px;}
.attach-thumb{max-width:80px;max-height:60px;border-radius:4px;border:1px solid #E5E2DA;cursor:pointer;object-fit:cover;}
.attach-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.attach-item{position:relative;display:inline-block;}
.attach-del{position:absolute;top:-4px;right:-4px;background:#E05A5A;color:#fff;border:none;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;}
.attach-file{display:flex;align-items:center;gap:4px;background:#F8F7F4;border:1px solid #E5E2DA;border-radius:6px;padding:3px 8px;font-size:11px;color:#555;cursor:pointer;}
.modal-voice-btn{border:1px solid #C8C5F0;background:#F5F3FF;color:#5A5FBE;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.break-active-banner{position:fixed;top:60px;left:0;right:0;z-index:999;
  background:#22A06B;color:#fff;height:60px;display:none;align-items:center;justify-content:center;
  padding:0 1rem;text-align:center;font-size:18px;font-weight:500;letter-spacing:.04em;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.break-active-banner.show{display:flex;}
.break-locked-row{opacity:0.35 !important;pointer-events:none !important;filter:grayscale(0.5);}
.break-locked .task-row:not(.break-task-highlight){opacity:0.35;pointer-events:none !important;}
.break-locked .task-row:not(.break-task-highlight) *{pointer-events:none !important;}
.break-task-highlight{box-shadow:0 0 0 3px #22A06B;border-radius:8px;background:#F0FAF5 !important;}
.interrupted-badge{display:inline-block;background:#FFF3CD;color:#856404;border:1px solid #FFE69C;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;margin-left:4px;}
.task-menu-wrap{display:inline-block;}
.task-menu-btn{border:1px solid #DDD;background:#F8F7F4;color:#555;border-radius:6px;padding:4px 7px;font-size:12px;cursor:pointer;font-family:inherit;}
.task-menu-btn:hover{background:#EEF0FF;color:#5A5FBE;}
/* ドロップダウンはbody直下にfixedで表示（overflow/z-indexの影響を受けない） */
#task-menu-portal{position:fixed;z-index:9999;background:#fff;border:1px solid #DDD;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.18);min-width:130px;padding:4px 0;display:none;}
#task-menu-portal.open{display:block;}
.task-menu-item{display:block;width:100%;text-align:left;padding:8px 16px;font-size:13px;font-family:inherit;border:none;background:none;cursor:pointer;color:#1A1A2E;white-space:nowrap;}
.task-menu-item:hover{background:#F5F3FF;color:#5A5FBE;}
.task-menu-item.red{color:#E05A5A;}
.task-menu-item.red:hover{background:#FFF0F0;}
.info-badge{display:inline-block;background:#FFF8EC;color:#B46B00;border:1px solid #F5D38A;border-radius:10px;padding:1px 6px;font-size:9px;font-weight:600;margin-left:4px;cursor:pointer;}
.info-field{font-size:11px;color:#888;padding:2px 0;}
.info-field span{color:#1A1A2E;}
.plan-card{background:#EFF6FF;border:1px solid #BAE6FD;border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px;cursor:pointer;transition:background .15s;}
.plan-card:hover{background:#DBEAFE;}
.plan-card.sel{background:#DBEAFE;border-color:#60A5FA;font-weight:600;}
.summary-box{background:#F0FAF5;border:1px solid #B6E8D0;border-radius:10px;padding:14px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.modal-voice-btn.on{background:#FFE8E8;color:#CC0044;animation:pulse 1s infinite;}
.task-row.parallel{border-left:3px solid #8B5CF6;background:#FDFAFF;}
.parallel-badge{background:#EDE9FF;color:#8B5CF6;border:1px solid #C4B5FD;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600;white-space:nowrap;}
.task-row:last-child{border-bottom:none}
.task-row.active-hl{background:#FFFBE6;border-left:3px solid #F5C842}
.task-row.drag-over{border-top:2px solid #5A5FBE}
.task-row.dragging-src{opacity:.35}
.drop-indicator{position:fixed;height:3px;background:#5A5FBE;border-radius:2px;z-index:9998;pointer-events:none;display:none;box-shadow:0 0 0 1.5px rgba(90,95,190,.25)}
.drop-indicator::before{content:'';position:absolute;left:-4px;top:-2.5px;width:8px;height:8px;border-radius:50%;background:#5A5FBE}
.drag-handle{color:#CCC;cursor:grab;font-size:18px;padding:8px 10px;margin:-6px -6px -6px -4px;flex-shrink:0;user-select:none;touch-action:none;display:inline-flex;align-items:center;justify-content:center}
.drag-handle:hover{color:#5A5FBE;background:#F0F0FA;border-radius:4px}
.drag-handle:active{cursor:grabbing}
/* 時刻＋所要時間（横並び） */
.task-timecol{display:flex;align-items:center;gap:4px;flex-shrink:0;width:auto}
.task-timerange{font-size:11px;color:#5A5FBE;font-weight:600;white-space:nowrap;min-width:90px}
.task-dur-wrap{display:flex;align-items:center;gap:2px}
.task-dur-inp{width:36px;border:1px solid #DDD;border-radius:4px;font-size:10px;text-align:center;color:#888;padding:2px 2px;background:#F8F7F4;font-family:inherit;outline:none}
.task-dur-inp:focus{border-color:#5A5FBE}
.task-dur-lbl{font-size:9px;color:#BBB}
/* タスク名 65%幅 */
.task-name{font-size:15px;font-weight:500;color:#1A1A2E;padding:0 4px;white-space:normal;word-break:break-all;flex:1;min-width:0;cursor:text;}
.task-name.hl{color:#B46B00;font-weight:600;font-size:15px}
.task-name-input{font-size:15px;font-weight:500;color:#1A1A2E;border:2px solid #5A5FBE;border-radius:6px;padding:2px 6px;font-family:inherit;outline:none;flex:1;min-width:0;background:#fff;}
/* アクションボタン */
.task-actions{display:flex;gap:9px;flex-shrink:0;margin-left:auto}
.ta-btn{border:none;border-radius:6px;padding:4px 7px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.ta-btn:active{opacity:.7}
.ta-start{background:#FFF3CD;color:#856404;border:1px solid #FFE69C}
.ta-start.on{background:#F5C842;color:#1A1A2E;border-color:#F5C842}
.ta-done{background:#D1F2E1;color:#0D6E3E;border:1px solid #A3E4C1}
.ta-resc{background:#FFF0CC;color:#B46B00;border:1px solid #F5D38A}
.ta-omit{background:#F0F0EE;color:#888;border:1px solid #DDD}
.ta-rec{background:#EEF0FF;color:#5A5FBE;border:1px solid #C8C5F0}
.ta-del{background:none;border:none;color:#CCC;cursor:pointer;font-size:15px;padding:2px 4px;line-height:1}
.ta-del:hover{color:#E05A5A}
/* スケジュール再引きボタン */
.btn-resched{background:#F0FAF5;border:1px solid #B6E8D0;color:#0D6E3E;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;display:flex;align-items:center;gap:5px}
.btn-resched:hover{background:#D1F2E1}
/* 展開エリア */
.task-expd{background:#F5F4FF;border-top:1px solid #E0DEFF;padding:8px 12px 8px 48px;display:none}
.task-expd.open{display:block}
textarea.mi{border:1px solid #DDD;border-radius:7px;padding:6px 10px;font-size:12px;background:#fff;width:100%;font-family:inherit;resize:none;color:#1A1A2E;outline:none;line-height:1.5;display:block}
textarea.mi:focus{border-color:#5A5FBE}
.rec-btns{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.rbtn{border:none;border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500}
.rbtn-text{background:#1A1A2E;color:#E8E4DC}
.rbtn-voice{background:#EEF0FF;color:#5A5FBE}
.rbtn-voice.on{background:#FFE8E8;color:#CC0044;animation:pulse 1s infinite}
.rbtn-ai{background:linear-gradient(135deg,#5A5FBE,#8B5CF6);color:#fff}
.rbtn-ai:disabled{opacity:.5;cursor:default}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.ai-box{background:#F0EFFF;border:1px solid #C8C5F0;border-radius:8px;padding:8px;margin-top:6px;font-size:12px}
.ai-memo{margin-bottom:4px;line-height:1.5;color:#1A1A2E}
.ai-actions{display:flex;flex-direction:column;gap:3px}
.ai-act-btn{background:#fff;border:1px solid #C8C5F0;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;color:#5A5FBE;text-align:left}
.ai-act-btn:hover{background:#EEEEFF}
.ai-skip{background:none;border:none;font-size:10px;color:#888;cursor:pointer;font-family:inherit;margin-top:2px;text-decoration:underline;display:block}
.reschedule-picker{background:#FFF8EC;border:1px solid #F5D38A;border-radius:8px;padding:8px;margin-top:6px}
.reschedule-picker p{font-size:11px;color:#B46B00;margin-bottom:5px;font-weight:500}
.rpick-btns{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.rpick-btn{border:1px solid #F5D38A;background:#fff;color:#B46B00;border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500}
.rpick-btn.sel{background:#B46B00;color:#fff;border-color:#B46B00}
input.date-inp{border:1px solid #DDD;border-radius:6px;padding:4px 8px;font-size:12px;font-family:inherit;color:#1A1A2E;background:#fff;outline:none}
.rpick-confirm{background:#B46B00;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;margin-top:4px}
/* タイムライン */
.tl{display:flex;flex-direction:column}
.tli{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #F0EDE8;align-items:flex-start}
.tli:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ttime{font-size:12px;color:#1A1A2E;font-weight:500;white-space:nowrap;min-width:48px}
.trange{font-size:10px;color:#888;display:block;margin-top:1px}
.tname-l{font-size:13px;font-weight:500;color:#1A1A2E}
.tmemo{font-size:11px;color:#555;margin-top:2px;white-space:pre-wrap;line-height:1.5}
.stag{margin-left:5px;font-size:10px;font-weight:500;border-radius:10px;padding:1px 6px;border:1px solid transparent;display:inline-block}
.rec-del{background:none;border:none;color:#CCC;cursor:pointer;font-size:15px;padding:0 3px;flex-shrink:0;margin-left:auto;line-height:1}
.rec-del:hover{color:#E05A5A}
.empty{text-align:center;color:#AAA;font-size:13px;padding:2rem 0}
.ftns{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap}
.bout{background:#fff;border:1px solid #DDD;border-radius:8px;padding:8px 15px;font-size:12px;cursor:pointer;font-family:inherit;color:#444}
.bout:hover{border-color:#AAA}
.badge{display:inline-block;background:#EEF0FF;color:#5A5FBE;border-radius:20px;padding:1px 7px;font-size:11px;font-weight:500;margin-left:3px}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-1px;margin-right:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.attend-summary{background:#F0FAF5;border:1px solid #B6E8D0;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.attend-time{font-size:13px;color:#1A1A2E}
.attend-time span{font-weight:600;color:#22A06B}
/* 設定 */
.settings-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #E5E2DA}
.settings-section:last-child{border-bottom:none}
.group-card{background:#fff;border:1px solid #E5E2DA;border-radius:10px;margin-bottom:8px;overflow:hidden}
.group-card-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#F7F6FF}
.group-card-title{font-size:13px;font-weight:600;color:#5A5FBE}
.group-tasks{padding:6px 14px 10px}
.group-task-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F5F2EE;font-size:13px}
.group-task-item:last-child{border-bottom:none}
.group-task-dur{width:52px;border:1px solid #DDD;border-radius:6px;padding:3px 6px;font-size:12px;text-align:center;font-family:inherit;outline:none;color:#1A1A2E}
.group-task-dur:focus{border-color:#5A5FBE}
.group-task-name{flex:1;font-size:12px;color:#1A1A2E}
.icon-btn{background:none;border:none;cursor:pointer;color:#CCC;font-size:16px;padding:0 3px;line-height:1}
.icon-btn:hover{color:#E05A5A}
input.inp{border:1px solid #DDD;border-radius:8px;padding:8px 12px;font-size:13px;background:#fff;color:#1A1A2E;outline:none;font-family:inherit;flex:1}
input.inp:focus{border-color:#5A5FBE;box-shadow:0 0 0 2px rgba(90,95,190,.12)}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.btn-s{background:#5A5FBE;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.btn-s:hover{opacity:.9}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px;color:#1A1A2E}
.modal p{font-size:13px;color:#444;margin-bottom:10px;line-height:1.6}
.modal-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.modal-btn{border:none;border-radius:8px;padding:11px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;text-align:left;width:100%}
.modal-btn-primary{background:#1A1A2E;color:#fff}
.modal-btn-close{background:none;color:#888;border:1px solid #DDD;text-align:center}
.rs-task-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0EDE8;font-size:13px}
.rs-task-item:last-child{border-bottom:none}
/* ── リンクバー（常時表示のリンク集） */
.linkbar{background:#fff;border-bottom:1px solid #E5E2DA;padding:8px 1rem;display:flex;flex-wrap:wrap;gap:6px;align-items:center;max-width:100%}
.linkbar:empty{display:none}
.linkbar-label{font-size:10px;font-weight:600;color:#AAA;letter-spacing:.06em;margin-right:2px;white-space:nowrap}
.link-chip{display:inline-flex;align-items:center;gap:4px;background:#EEF0FF;color:#5A5FBE;border:1px solid #C8C5F0;border-radius:16px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;white-space:nowrap;transition:background .15s}
.link-chip:hover{background:#E0E2FF}
.link-chip:active{opacity:.7}

<script>
const TKEY='tlH4-tasks',RKEY='tlH4-records',TMKEY='tlH4-templates',AKEY='tlH4-attend',PHKEY='tlH4-ph',MKEY='tlH4-appmemos',FKEY='tlH4-savefolder',LKEY='tlH4-later',FTKEY='tlH4-future';
const PREFKEY='tlH4-prefs',CALKEY='tlH4-calcache',BKKEY='tlH4-bookmarks';
const FREEE_DEFAULT_URL='https://kintaiplus.freee.co.jp/independent/recorder2/personal/';
let prefs={freeeAuto:true,freeeUrl:FREEE_DEFAULT_URL,icsUrl:''};
let _calCache=null; // {fetchedAt,source,events:[{start,end,summary,location,allDay}]}
let _calFetching=false;
let bookmarks=[]; // [{id,name,url,tier:'lg'|'sm'|'list'}]
let _bkEditMode=false;

const STATUS={
  active:     {label:'対応中',  color:'#1A1A2E',bg:'#fff',   border:'#E5E2DA',dot:'#5A5FBE'},
  done:       {label:'完了',    color:'#22A06B',bg:'#F0FAF5',border:'#B6E8D0',dot:'#22A06B'},
  reschedule: {label:'リスケ',  color:'#B46B00',bg:'#FFF8EC',border:'#F5D38A',dot:'#E8A020'},
  omit:       {label:'オミット',color:'#888',  bg:'#F5F5F3',border:'#DDDBD6',dot:'#BBB'},
};
// 表示順：対応中→完了→予定→リスケ→オミット
const SECTIONS=[
  {key:'active',     icon:'▶',label:'対応中',  color:'#1A1A2E'},
  {key:'done',       icon:'✓',label:'完了',    color:'#22A06B'},
  {key:'future',     icon:'📅',label:'予定',   color:'#0369A1'},
  {key:'reschedule', icon:'↺',label:'リスケ',  color:'#B46B00'},
  {key:'omit',       icon:'—',label:'オミット',color:'#888'},
];
// future ステータス定義を STATUS に追加
STATUS['future']={label:'予定',color:'#0369A1',bg:'#EFF6FF',border:'#BAE6FD',dot:'#38BDF8'};

let tasks=[],records=[],templates=[],attend={};
let taskMemos={}; // {taskId:[{id,text,ts}]} 複数件メモ
let _expdTab={}; // {taskId:'memo'|'record'} 展開エリアのタブ状態
let _groupOpen={}; // {gi:true} 定型グループの開閉状態（デフォルト閉）
let aiLinks=[]; // [{id,name,url}] 生成AIリンク集
let _recHistOpen={}; // {taskId:true} 記録履歴の開閉状態（デフォルト閉）
let _editingMemo={}; // {taskId: memoId} 編集中のメモID
let _recordMemos=[]; // 所感・メモ（記録タブ下部）
let _doneSearchKw=''; // 完了セクションの検索キーワード
let placeholderEx='業界ニュースリサーチ\n朝会（10:30）\nVectorworks操作の試行';
let sectionOpen={active:true,done:false,future:true,reschedule:false,omit:false,fixed:true};
let activeExpd=null,memos={},aiData={},aiLoading={};
let listening=false,listeningFor=null,recog=null;
let taskStartTime={},reschedulePickState={};
let appMemos=[]; // アプリ修正メモ
let _taskRecAiTool={}; // 記録展開エリアでのAI選択状態
let _attachments={}; // {taskId: [{id,name,type,dataUrl}]}
let _modalVoiceRecog=null,_modalVoiceOn=false,_modalVoiceTarget=null;
let saveFolder=null; // 保存先フォルダ名（表示用）
let _bulkVoiceRecog=null,_bulkVoiceOn=false; // タスク追加欄音声
let laterItems=[]; // 「後で」リスト
let _pendingTime=null;
let _breakLock=false; // 休憩ロック中フラグ
let _breakNotifTimers=[]; // 通知タイマーID配列 // 時計ボタンで設定した時刻（次の着手/完了に付与）
let _geminiAvailable=null; // Gemini Nano 利用可否（null=未チェック）
let _idSeq=0;
function _nextId(){ return Date.now()*1000 + (_idSeq++ % 1000); } // 整数ID生成（小数点なし）
let _taskInfo={}; // タスク補完情報 {taskId: {client:'', output:'', context:''}}
let _lastSummaryText=''; // 退勤サマリテキスト（一時保存）
let _activeMenu=null; // 現在開いているドロップダウンメニューのtaskId
let _modalJustOpened=false; // openModal直後のグローバルクリック誤検知防止フラグ

// ── Utils
function todayKey(){const j=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));const p=n=>String(n).padStart(2,'0');return `${j.getFullYear()}-${p(j.getMonth()+1)}-${p(j.getDate())}`;}
function getJST(){const j=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));const p=n=>String(n).padStart(2,'0');return `${j.getFullYear()}-${p(j.getMonth()+1)}-${p(j.getDate())} ${p(j.getHours())}:${p(j.getMinutes())}`;}
function timeOnly(ts){return ts?ts.slice(11,16):'';}
function addDays(d,n){const x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);const p=v=>String(v).padStart(2,'0');return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}`;}
function nextMonday(d){const x=new Date(d+'T00:00:00');x.setDate(x.getDate()+(((8-x.getDay())%7)||7));const p=v=>String(v).padStart(2,'0');return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}`;}
function prevWorkday(d){const x=new Date(d+'T00:00:00');do{x.setDate(x.getDate()-1);}while(x.getDay()===0||x.getDay()===6);const p=v=>String(v).padStart(2,'0');return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}`;}
function ld(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb}catch{return fb}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── 予定時刻の自動計算（10分ブロック丸め）
// 分単位の切り上げ（1つの数値で扱う版）
function roundUpMin10(totalMin){
  return [Math.ceil(totalMin/10)*10];
}

function roundUp10(h,m){
  // 10分単位で切り上げ
  if(m%10===0) return [h,m];
  const rm=Math.ceil(m/10)*10;
  return rm>=60 ? [h+1, rm-60] : [h, rm];
}

// ── 予定（時刻固定アイテム）か判定：時刻指定あり(_hasFixedTime) / 小休憩・昼休憩(_autoBreak)
// v3.0.0: 着手済み(started)はロック対象から外した（自由に並び替え可能。時刻は実開始時刻を表示）
function _isFixedItem(t){
  return !!(t._hasFixedTime || t._autoBreak);
}
function _isTimeLocked(t){ // 互換用（スケジュール計算での時刻アンカー判定）
  return _isFixedItem(t) || !!t.started;
}

// ── スケジュール計算（v3.0.0: 隙間流し込み方式）
// 予定（時刻固定アイテム）は自分の時刻に固定表示。
// 自由タスクは並び順どおりに、予定・休憩のブロックを自動で避けて時間を割り当てる。
// → タスクを並び替えるだけで、時間が予定を避けて再計算される。
function calcScheduledTimes(baseOverride){
  const base=baseOverride||(attend.inTime?attend.inTime:getJST());
  let cur=Math.ceil(_toMin(timeOnly(base))/10)*10;
  const active=tasks.filter(t=>t.status==='active');

  // ① 予定・休憩：_startOverrideの時刻をそのまま採用
  const fixed=active.filter(t=>_isFixedItem(t)&&t._startOverride);
  fixed.forEach(t=>{
    const s=_toMin(t._startOverride);
    t.scheduledStart=_toHHMM(s);
    t.scheduledEnd=_toHHMM(s+(parseInt(t.duration)||0));
  });

  // ② ブロッカー帯を作成（重なりはマージ）
  const blocks=fixed.map(t=>({s:_toMin(t.scheduledStart),e:_toMin(t.scheduledStart)+(parseInt(t.duration)||0)}))
    .sort((a,b)=>a.s-b.s);
  const merged=[];
  blocks.forEach(b=>{
    const last=merged[merged.length-1];
    if(last&&b.s<=last.e){last.e=Math.max(last.e,b.e);}
    else merged.push({s:b.s,e:b.e});
  });

  // ③ 自由タスク：並び順どおりにブロッカーを避けて流し込み
  active.filter(t=>!_isFixedItem(t)).forEach(t=>{
    const dur=parseInt(t.duration)||0;
    if(t.started&&t._startOverride){
      // 着手済みは実開始時刻を起点に（ブロッカー回避はしない＝実績優先）
      cur=_toMin(t._startOverride);
    }else{
      // ブロッカーと重なる場合は、ブロッカーの終了後へずらす
      let moved=true,guard=0;
      while(moved&&guard++<50){
        moved=false;
        for(const b of merged){
          if(cur<b.e&&cur+dur>b.s){cur=Math.ceil(b.e/10)*10;moved=true;break;}
        }
      }
    }
    t.scheduledStart=_toHHMM(cur);
    t.scheduledEnd=_toHHMM(cur+dur);
    cur=Math.ceil((cur+dur)/10)*10;
  });
}

// ── マイグレーション v0.1.1→v0.2系
function migrateFromV011(){
  const MK='tlH4-migrated';
  if(localStorage.getItem(MK))return;
  const OLD={tasks:'tlH3-tasks',records:'tlH3-records',templates:'tlH3-templates',attend:'tlH3-attend',ph:'tlH3-placeholder'};
  const ot=ld(OLD.tasks,null);if(ot&&ot.length)sv(TKEY,ot.map(t=>({...t,duration:t.duration||30})));
  const or=ld(OLD.records,null);if(or&&Object.keys(or).length)sv(RKEY,or);
  const otm=ld(OLD.templates,null);if(otm&&otm.length)sv(TMKEY,[{title:'引き継ぎ',tasks:otm.map(t=>({name:t.name,duration:30}))}]);
  const oa=ld(OLD.attend,null);if(oa)sv(AKEY,oa);
  const op=ld(OLD.ph,null);if(op)sv(PHKEY,op);
  localStorage.setItem(MK,'1');
}


// ── 小数点ID → 整数ID マイグレーション（v0.6.6）
function migrateFractionalIds(){
  const MK2='tlH4-idmigrated-v549';
  if(localStorage.getItem(MK2))return;
  let changed=false;
  const idMap={};
  const t=ld(TKEY,[]);
  t.forEach(task=>{
    if(typeof task.id==='number' && !Number.isInteger(task.id)){
      const newId=_nextId();
      idMap[task.id]=newId;
      task.id=newId;
      changed=true;
    }
  });
  if(changed){
    sv(TKEY,t);

        📅 通常勤務：昼休憩60分＋1時間ごとに小休憩10分を自動挿入

// ══════════════════════════════════════════
// 小休憩機能（v0.6.6 時刻ソート方式）
// ══════════════════════════════════════════

// 時刻ユーティリティ
function _toMin(s){ const[h,m]=s.split(':').map(Number); return h*60+m; }
function _toHHMM(min){
  const v=((min%1440)+1440)%1440;
  return String(Math.floor(v/60)).padStart(2,'0')+':'+String(v%60).padStart(2,'0');
}

// ── ① 小休憩の全件計算・挿入
function calcBreaks(fromMin=null){
  if(!attend.inTime) return;

  const inMin  = _toMin(timeOnly(attend.inTime));
  const outStr = attend.plannedOutTime || _toHHMM(inMin+540);
  const outMin = _toMin(outStr);
  const effectiveOut = outMin<=inMin ? outMin+1440 : outMin;

  // 起点：fromMin指定があれば終了後基点、なければ出勤時刻
  const baseMin = (fromMin!=null) ? fromMin : inMin;

  const lunchStr = attend.lunchTime&&attend.lunchTime!=='none' ? attend.lunchTime : null;
  const lunchMin = lunchStr ? _toMin(lunchStr) : null;
  const lunchEnd = lunchMin!=null ? lunchMin+60 : null;

  // 現在時刻（挿入フィルター用）
  const nowMin=_toMin(timeOnly(getJST()));

  // 小休憩時刻を計算（baseMinから1時間ごと、現在時刻以降のみ）
  const bMins=[];
  let next=baseMin+60;
  while(next+10<=effectiveOut){
    if(lunchMin!=null && next>=lunchMin-5 && next<=lunchEnd+5){
      next=lunchEnd+60; continue;
    }
    if(next>nowMin) bMins.push(next); // 現在時刻より後のみ挿入
    next+=60;
  }

  // 既存休憩タスクIDを再利用
  const existingBreaks = tasks.filter(t=>t._autoBreak);
  const existingLunch  = existingBreaks.find(t=>t._isLunch);
  const existingSmall  = existingBreaks.filter(t=>!t._isLunch);

  const normalTasks = tasks.filter(t=>t.status==='active'&&!t._autoBreak);
  const otherTasks  = tasks.filter(t=>t.status!=='active');

  // 休憩タスクを生成（ID再利用）
  const breakTasks=[];
  if(lunchMin!=null && !attend._lunchDone){
    const lt = existingLunch ? {...existingLunch, _startOverride:_toHHMM(lunchMin)}
      : {id:Date.now()-2,name:'🍽 昼休憩',status:'active',duration:60,_autoBreak:true,_isLunch:true,_startOverride:_toHHMM(lunchMin)};
    breakTasks.push(lt);
  }
  bMins.forEach((bMin,i)=>{
    const ex=existingSmall[i];
    breakTasks.push(ex ? {...ex,_startOverride:_toHHMM(bMin)}
      : {id:Date.now()+i+10,name:'☕ 小休憩',status:'active',duration:10,_autoBreak:true,_isLunch:false,_startOverride:_toHHMM(bMin)});
  });

  // 配置：時刻固定の休憩タスクを基準に通常タスクを均等分配
  breakTasks.sort((a,b)=>_toMin(a._startOverride)-_toMin(b._startOverride));
  const normalWithTime = normalTasks.filter(t=>t._startOverride)
    .sort((a,b)=>_toMin(a._startOverride)-_toMin(b._startOverride));
  const normalNoTime   = normalTasks.filter(t=>!t._startOverride);
  // 時刻付きタスク（通常+休憩）を時刻順にソートして配置
  const allTimed = [...normalWithTime,...breakTasks]
    .sort((a,b)=>_toMin(a._startOverride)-_toMin(b._startOverride));

  // 時刻なしタスクを先頭に、時刻付きタスクをその後ろに配置
  const finalActive=[...normalNoTime,...allTimed];

  tasks=[...finalActive,...otherTasks];
  sv(TKEY,tasks);
  _scheduleBreakNotifs(bMins);
}


function _scheduleBreakNotifs(bMins){
  // 既存タイマーをクリア
  _breakNotifTimers.forEach(id=>clearTimeout(id));
  _breakNotifTimers=[];
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  const nowMin=_toMin(timeOnly(getJST()));
  bMins.forEach(bMin=>{
    if(bMin<=nowMin) return;
    const tid=setTimeout(()=>{
      new Notification('☕ 小休憩の時間です',{
        body:'10分間の休憩をどうぞ！',silent:false
      });
      const banner=document.getElementById('break-active-banner');
      if(banner){
        banner.textContent='☕ 小休憩の時間です — 開始ボタンを押して休憩しましょう';
        banner.classList.add('show');
        setTimeout(()=>banner.classList.remove('show'),15000);
      }
    },(bMin-nowMin)*60*1000);
    _breakNotifTimers.push(tid);
  });
}

// ── ② 休憩タスク開始（手動ロック）
function startBreakWithLock(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  // 既に別の休憩が開始中ならブロック
  const running=tasks.find(x=>x._autoBreak&&x.started&&x.id!==id);
  if(running){alert('既に休憩中です。現在の休憩を終了してください。');return;}
  if(t.started) return;
  t.started=true;
  t.startedAt=getJST();
  sv(TKEY,tasks);
  // ロック開始
  _breakLock=true;
  const banner=document.getElementById('break-active-banner');
  if(banner){
    // 終了予定時刻を計算（開始時刻＋所要時間）
    const dur=parseInt(t.duration)||10;
    const [sh,sm]=timeOnly(t.startedAt).split(':').map(Number);
    let eh=sh, em=sm+dur; eh+=Math.floor(em/60); em=em%60;
    const endStr=String(eh).padStart(2,'0')+':'+String(em).padStart(2,'0');
    banner.textContent='☕ 休憩中 — 終了予定 '+endStr;
    banner.classList.add('show');
  }
  renderTasks();
  // ロック中クリックのインターセプト登録
  _registerBreakLockHandler();
}

// ── ③ 休憩タスク終了
function completeBreakTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const now=getJST();
  // 昼休憩を完了した場合はフラグを立てて再挿入を防ぐ
  if(t._isLunch){ attend._lunchDone=true; saveAttend(); }
  const dur=t.startedAt
    ?Math.round((new Date(now.replace(' ','T'))-new Date(t.startedAt.replace(' ','T')))/60000)
    :parseInt(t.duration)||0;
  pushRecord(t,'休憩終了','break_done',{startedAt:t.startedAt,endedAt:now,durationMin:dur});
  tasks=tasks.filter(x=>x.id!==id);
  sv(TKEY,tasks);
  // ロック解除
  _breakLock=false;
  const banner=document.getElementById('break-active-banner');
  if(banner) banner.classList.remove('show');
  _unregisterBreakLockHandler();
  // 終了時刻起点で再計算
  if(attend.inTime&&!attend.outTime){
    const endedMin=_toMin(timeOnly(now));
    calcBreaks(endedMin);
  }
  renderTasks();
}

// 休憩タスク削除（手動）
function deleteBreakTask(id){
  const t=tasks.find(t=>t.id===id);if(!t||!t._autoBreak)return;
  if(!confirm((t.name)+'を削除しますか？'))return;
  tasks=tasks.filter(x=>x.id!==id);
  sv(TKEY,tasks);
  renderTasks();
}

// 強制終了（ロック中に他操作→モーダルから）
function forceEndBreak(){
  // モーダルを先に閉じてDOM競合を解消
  document.getElementById('modal-overlay').classList.add('hidden');
  _breakLock=false;
  _unregisterBreakLockHandler();
  const banner=document.getElementById('break-active-banner');
  if(banner) banner.classList.remove('show');
  const running=tasks.find(t=>t._autoBreak&&t.started);
  if(running){
    // 休憩タスクを終了処理
    const now=getJST();
    const dur=running.startedAt
      ?Math.round((new Date(now.replace(' ','T'))-new Date(running.startedAt.replace(' ','T')))/60000)
      :parseInt(running.duration)||0;
    pushRecord(running,'休憩終了（強制）','break_done',{startedAt:running.startedAt,endedAt:now,durationMin:dur});
    tasks=tasks.filter(x=>x.id!==running.id);
    sv(TKEY,tasks);
  }
  if(attend.inTime&&!attend.outTime){
    const endedMin=_toMin(timeOnly(getJST()));
    calcBreaks(endedMin);
  }
  renderTasks();
}

// ロック中クリックインターセプト
function _registerBreakLockHandler(){
  const vt=document.getElementById('v-tasks');if(!vt)return;
  if(vt._bkHandler) return; // 既に登録済み
  vt._bkHandler=function(e){
    if(!_breakLock) return;
    if(e.target.closest('.break-end-btn')||e.target.closest('#btn-out')) return;
    const row=e.target.closest('.task-row');
    if(row&&row.classList.contains('break-task-highlight')) return;
    e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();
    if(!document.getElementById('modal-overlay').classList.contains('hidden')) return;
    document.getElementById('modal-content').innerHTML=`
      <h3>☕ 休憩中です</h3>
      <p style="font-size:14px;color:#444;margin:8px 0 16px;text-align:center">
        休憩を終了して作業を再開しますか？</p>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-primary" onclick="forceEndBreak()">✅ 休憩を終了して再開</button>
        <button class="modal-btn modal-btn-close" onclick="closeModal()">☕ 休憩を続ける</button>
      </div>`;
    openModal();
  };
  vt._bkHandlerMD=function(e){
    if(!_breakLock) return;
    if(e.target.closest('.break-end-btn')||e.target.closest('#btn-out')) return;
    const row=e.target.closest('.task-row');
    if(row&&row.classList.contains('break-task-highlight')) return;
    e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();
  };
  vt.addEventListener('click',vt._bkHandler,true);
  vt.addEventListener('mousedown',vt._bkHandlerMD,true);
}
function _unregisterBreakLockHandler(){
  const vt=document.getElementById('v-tasks');if(!vt)return;
  if(vt._bkHandler){vt.removeEventListener('click',vt._bkHandler,true);vt._bkHandler=null;}
  if(vt._bkHandlerMD){vt.removeEventListener('mousedown',vt._bkHandlerMD,true);vt._bkHandlerMD=null;}
}


function finalizeCheckIn(outTime,lunchTime){
  pushSystemRecord('🟢 出勤',attend.inTime);
  attend.lunchTime=lunchTime;
  // 通知許可を出勤時に一括リクエスト（許可完了後に通知を再スケジュール）
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission().then(()=>{
      // 許可が得られたら通知を再スケジュール
      if(Notification.permission==='granted'){
        const bt=tasks.filter(t=>t._autoBreak&&!t._isLunch);
        const bMins=bt.map(t=>_toMin(t._startOverride)).filter(m=>m>0);
        if(bMins.length) _scheduleBreakNotifs(bMins);
      }
    });
  }
  const today=todayKey();
  tasks.forEach(t=>{
    if(t.status==='future'&&t.rescheduleDate&&t.rescheduleDate<=today){
      t.status='active';
      if(t._scheduleTime) t._startOverride=t._scheduleTime;
    }
  });
  sv(TKEY,tasks);
  calcBreaks();
  renderTasks();
  // Gemini Nanoが利用可能なら出勤時AIプランニングを提案
  if(_geminiAvailable){
    setTimeout(()=>showCheckinAiPlanning(outTime),800);
  }
}

}

function checkinProjectDuty(){
  // 案件稼働：通常の「出勤」記録は残さず、「案件稼働」のみを記録する
  // （clickCheckInで既に作られた通常の出勤記録があれば取り除く）
  const all=ld(RKEY,{});
  const today=todayKey();
  if(all[today]){
    all[today]=all[today].filter(r=>!(r.isSystem&&r.taskName==='🟢 出勤'&&r.timestamp===attend.inTime));
    sv(RKEY,all);
    records=all[today]||[];
  }
  attend._projectDuty=true;
  saveAttend();
  pushSystemRecord('🏢 案件稼働で出勤（本日の全タスクは正確な時間記録として利用不可）', attend.inTime);
  closeModal();
  renderTasks();
}

    function buildOutOptions(defaultHours){
      const def=new Date(now.getTime()+defaultHours*60*60*1000);
      const rawMin=def.getMinutes();
      const roundedMin=rawMin===0?0:Math.ceil(rawMin/10)*10;
      const addH=roundedMin>=60?1:0;
      const finalH=(def.getHours()+addH)%24;
      const finalM=roundedMin>=60?roundedMin-60:roundedMin;
      const defVal=p(finalH)+':'+p(finalM);
      let opts='';let found=false;
      for(let h=0;h<=23;h++){for(let m=0;m<60;m+=10){
        const val=p(h)+':'+p(m);const sel=val===defVal;if(sel)found=true;
        opts+=`<option value="${val}"${sel?' selected':''}>${val}</option>`;

// チェックイン各ステップの処理
function checkinNext(fromStep){
  if(fromStep===1){
    const memo=document.getElementById('checkin-memo')?.value.trim();
    if(memo) pushSystemRecord('📧 Slack・メール確認: '+memo, getJST());
    else pushSystemRecord('📧 Slack・メール確認完了', getJST());
    // 1/7の追加タスク入力を処理
    const txt1=document.getElementById('checkin-add-tasks-1')?.value.trim();
    if(txt1){
      txt1.split(/\r?\n/).filter(l=>l.trim()).forEach(line=>{
        const parsed=parseTaskLine(line.trim());
        const task={id:_nextId(),name:parsed.name,status:'active',duration:parsed.duration||30};
        if(parsed.scheduleTime){task._startOverride=parsed.scheduleTime;task._hasFixedTime=true;tasks.push(task);}
        else{const fa=tasks.findIndex(x=>x.status==='active');if(fa>=0)tasks.splice(fa,0,task);else tasks.push(task);}
      });
      sv(TKEY,tasks);
    }
    showCheckinStep(2);
  } else if(fromStep===2){
    // 退勤時間・昼休憩・シフト設定を保存して出勤確定
    const outTime=document.getElementById('ci-out-time')?.value||'19:00';
    const lunchEl=document.getElementById('ci-lunch-time');
    const shift=document.querySelector('input[name="shift-type"]:checked')?.value||'full';
    const lunchTime=(shift==='full'&&lunchEl)?lunchEl.value:'none';
    attend.inTime=getJST();
    attend.plannedOutTime=outTime;
    attend.lunchTime=lunchTime!=='none'?lunchTime:null;
    attend.shiftType=shift;
    window._checkinOutTime=outTime;
    window._checkinLunchTime=lunchTime;
    saveAttend();updateAttendButtons();
    showCheckinStep(3);
  } else if(fromStep===3){
    showCheckinStep(4);
  } else if(fromStep===5){
    const txt=document.getElementById('checkin-add-tasks')?.value.trim();
    if(txt){
      txt.split(/\r?\n/).filter(l=>l.trim()).forEach(line=>{
        const parsed=parseTaskLine(line.trim());
        const id=_nextId();
        const task={id,name:parsed.name,status:'active',duration:parsed.duration||30};
        if(parsed.scheduleTime){task._startOverride=parsed.scheduleTime;task._hasFixedTime=true;}
        tasks.push(task);
      });
      sv(TKEY,tasks);
    }
    showCheckinStep(6);
  }
}

// リスケタスク：今日に追加（対応中へ移動しリスケから消す）
function checkinInheritTask(id){
  const t=tasks.find(t=>t.id===id);
  if(t){
    t.status='active';
    delete t.rescheduleDate;
    if(t._scheduleTime){t._startOverride=t._scheduleTime;t._hasFixedTime=true;delete t._scheduleTime;}
    sv(TKEY,tasks);
    const el=document.getElementById('ci-rs-'+id);
    if(el){el.style.opacity='.4';el.querySelectorAll('button').forEach(b=>{b.disabled=true;});
      const badge=document.createElement('span');badge.textContent='✓ 追加済み';badge.style.cssText='font-size:11px;color:#22A06B;font-weight:600';el.appendChild(badge);}
  }
}
// リスケタスク：スキップ（リスケに残す）
function checkinSkipRsTask(id){
  const el=document.getElementById('ci-rs-'+id);
  if(el){el.style.opacity='.4';el.querySelectorAll('button').forEach(b=>{b.disabled=true;});
    const badge=document.createElement('span');badge.textContent='スキップ';badge.style.cssText='font-size:11px;color:#888';el.appendChild(badge);}
}

function checkinApplyTemplates(){
  const checks=[...document.querySelectorAll('.tmpl-chk:checked')];
  const grps=ld('tlH4-templates',[]);
  checks.forEach(c=>{
    const gi=parseInt(c.dataset.gi),ti=parseInt(c.dataset.ti);
    const tmpl=grps[gi]?.tasks[ti];if(!tmpl)return;
    tasks.push({id:_nextId(),name:tmpl.name,status:'active',duration:tmpl.duration||30});
  });
  if(checks.length) sv(TKEY,tasks);
  showCheckinStep(5);
}

function checkinApplyAi(){
  if(window._aiPriorityIds?.length) applyAiPlanningIds(window._aiPriorityIds);
  showCheckinStep(7);
}

function applyAiPlanningIds(ids){
  const prioritized=ids.map(id=>tasks.find(t=>t.id===id)).filter(Boolean);
  const rest=tasks.filter(t=>t.status==='active'&&!t._autoBreak&&!ids.includes(t.id));
  const breaks=tasks.filter(t=>t.status==='active'&&t._autoBreak);
  const others=tasks.filter(t=>t.status!=='active');
  tasks=[...prioritized,...rest,...breaks,...others];
  sv(TKEY,tasks);reinsertBreaks();calcScheduledTimes(_schedBase);
}

// モーダル内ドラッグ&ドロップ
let _planDragId=null;
function planDragStart(e,id){_planDragId=id;e.dataTransfer.effectAllowed='move';}
function planDrop(e,id){
  e.preventDefault();
  document.querySelectorAll('.plan-sort-row').forEach(r=>r.classList.remove('drag-over'));
  if(!_planDragId||_planDragId===id)return;
  const list=document.getElementById('plan-sort-list');
  const rows=[...list.querySelectorAll('.plan-sort-row')];
  const si=rows.findIndex(r=>parseInt(r.dataset.id)===_planDragId);
  const di=rows.findIndex(r=>parseInt(r.dataset.id)===id);
  if(si<0||di<0)return;
  const moved=rows[si];
  if(si<di) list.insertBefore(moved,rows[di].nextSibling);
  else list.insertBefore(moved,rows[di]);
  _planDragId=null;
}

// ── 時刻指定ありタスクの10分前通知
function scheduleFixedTimeNotifs(){
  if(window._fixedNotifTimers) window._fixedNotifTimers.forEach(id=>clearTimeout(id));
  window._fixedNotifTimers=[];
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  if(!attend.inTime||attend.outTime) return;
  const nowMin=_toMin(timeOnly(getJST()));
  tasks.filter(t=>t.status==='active'&&t._hasFixedTime&&t._startOverride).forEach(t=>{
    const taskMin=_toMin(t._startOverride);
    const notifyMin=taskMin-10;
    if(notifyMin<=nowMin) return;
    const tid=setTimeout(()=>{
      try{ new Notification('⏰ もうすぐ時刻指定タスクです',{
        body:t.name+'（'+t._startOverride+'〜）が10分後に開始予定です'
      }); }catch(e){}
    },(notifyMin-nowMin)*60*1000);
    window._fixedNotifTimers.push(tid);
  });
}

// ── 小休憩を時刻順の正しい位置に再配置（並べ替え後に呼ぶ）
function reinsertBreaks(){
  const breakTasks   = tasks.filter(t=>t._autoBreak);
  if(!breakTasks.length) return;
  const normalTasks  = tasks.filter(t=>t.status==='active'&&!t._autoBreak);
  const otherTasks   = tasks.filter(t=>t.status!=='active');

  const normalWithTime = normalTasks.filter(t=>t._startOverride)
    .sort((a,b)=>_toMin(a._startOverride)-_toMin(b._startOverride));
  const normalNoTime   = normalTasks.filter(t=>!t._startOverride);

  const allTimed = [...normalWithTime,...breakTasks]
    .sort((a,b)=>_toMin(a._startOverride)-_toMin(b._startOverride));

  tasks=[...normalNoTime,...allTimed,...otherTasks];
  sv(TKEY,tasks);
}

function applyAiPlanning(ids){
  closeModal();
  const prioritized=ids.map(id=>tasks.find(t=>t.id===id)).filter(Boolean);
  const rest=tasks.filter(t=>t.status==='active'&&!t._autoBreak&&!ids.includes(t.id));
  const breaks=tasks.filter(t=>t.status==='active'&&t._autoBreak);
  const others=tasks.filter(t=>t.status!=='active');
  // まず通常タスクだけ並べ替え（休憩は後でreinsertBreaksで再配置）
  tasks=[...prioritized,...rest,...breaks,...others];
  sv(TKEY,tasks);
  reinsertBreaks();
  calcScheduledTimes(_schedBase);renderTasks();
}

function insertBreakTasks(inTimeStr, outTimeStr, lunchTimeStr){
  tasks=tasks.filter(t=>!t._autoBreak);
  const toMin=(str)=>{const[h,m]=str.split(':').map(Number);return h*60+m;};
  const inMin=toMin(timeOnly(inTimeStr));
  const hasLunch=lunchTimeStr&&lunchTimeStr!=='none';
  const lunchMin=hasLunch?toMin(lunchTimeStr):null;

  // タスクの順序に基づいて累積時間を計算し、1時間ごとに小休憩を挿入
  const activeTasks=tasks.filter(t=>t.status==='active'&&!t._autoBreak);
  const othersNonActive=tasks.filter(t=>t.status!=='active');

  let curMin=inMin;
  const breakScheduled=[];
  let accSinceBreak=0;

  // 昼休憩を先に配置（lunchMinになったら強制挿入）
  activeTasks.forEach((t,i)=>{
    const dur=parseInt(t.duration)||30;

    // 昼休憩：このタスクの開始前にlunchMinを過ぎていたら挿入
    if(hasLunch&&lunchMin!==null&&curMin<lunchMin&&curMin+dur>lunchMin){
      const base=Date.now()+i*10;
      const lhh=String(Math.floor(lunchMin/60)).padStart(2,'0');
      const lmm=String(lunchMin%60).padStart(2,'0');
      breakScheduled.push({id:base-1,name:'🍽 昼休憩',status:'active',duration:60,
        _autoBreak:true,_breakAt:lunchMin,_startOverride:`${lhh}:${lmm}`});
      curMin=lunchMin+60;
      accSinceBreak=0;
    }

    // 累積1時間で小休憩を挿入（昼休憩直後は除く）
    if(accSinceBreak>=60){
      const base=Date.now()+i*10+1;
      const bhh=String(Math.floor(curMin/60)).padStart(2,'0');
      const bmm=String(curMin%60).padStart(2,'0');
      breakScheduled.push({id:base,name:'☕ 小休憩',status:'active',duration:10,
        _autoBreak:true,_breakAt:curMin,_startOverride:`${bhh}:${bmm}`});
      curMin+=10;
      [curMin]=roundUpMin10(curMin);
      accSinceBreak=0;
    }

    breakScheduled.push(t);
    curMin+=dur;
    [curMin]=roundUpMin10(curMin);
    accSinceBreak+=dur;
  });

  tasks=[...breakScheduled,...othersNonActive];
  sv(TKEY,tasks);

  // 通知スケジューリング用にbreaks配列を再構築
  const breaks=tasks.filter(t=>t._autoBreak&&t._breakAt!==undefined)
    .map(t=>({at:t._breakAt,dur:t.duration,name:t.name}));


  // 休憩通知：許可がdefaultなら再度リクエスト
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  if('Notification' in window && Notification.permission==='granted'){
    breaks.forEach(b=>{
      const nowMs=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'})).getTime();
      const bHH=String(Math.floor(b.at/60)).padStart(2,'0');
      const bMM=String(b.at%60).padStart(2,'0');
      const startMs=new Date(todayKey()+'T'+bHH+':'+bMM+':00').getTime();
      const endMs=startMs+b.dur*60*1000;
      // 休憩開始通知
      if(startMs-nowMs>0){
        setTimeout(()=>{
          new Notification('⏰ '+b.name+' 開始',{
            body:'開始時刻: '+bHH+':'+bMM,
            silent:false
          });
        },startMs-nowMs);
      }
      // 休憩終了通知 ＋ 次タスク案内
      if(endMs-nowMs>0){
        setTimeout(()=>{
          // 次の通常タスクを探す
          const nextTask=tasks.filter(t=>t.status==='active'&&!t._autoBreak&&t._startOverride)
            .sort((a,c)=>a._startOverride.localeCompare(c._startOverride))[0]
            ||tasks.filter(t=>t.status==='active'&&!t._autoBreak)[0];
          const doneCount=tasks.filter(t=>t.status==='done').length;
          const activeCount=tasks.filter(t=>t.status==='active'&&!t._autoBreak).length;
          const body=(nextTask?'次: '+nextTask.name+'\n':'')
            +'完了: '+doneCount+'件 / 対応中: '+activeCount+'件';
          new Notification('✅ '+b.name+' 終了',{
            body,
            silent:false
          });
        },endMs-nowMs);
      }
    });
  }

  const base=Date.now();
  // 休憩タスクに_startOverrideをセット（固定時刻で表示されるよう）
  breaks.forEach((b,i)=>{
    const hh=Math.floor(b.at/60), mm=b.at%60;
    const timeStr=`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
    tasks.push({
      id:base+i, name:b.name, status:'active',
      duration:b.dur, _autoBreak:true, _breakAt:b.at,
      _startOverride:timeStr, // 固定時刻
    });
  });

  const nonBreak=tasks.filter(t=>t.status==='active'&&!t._autoBreak);
  const breakTasks=tasks.filter(t=>t.status==='active'&&t._autoBreak);
  const others=tasks.filter(t=>t.status!=='active');

  let h=Math.floor(inMin/60),m=inMin%60;
  [h,m]=roundUp10(h,m);
  const scheduled=[];
  nonBreak.forEach(t=>{
    const startMin=h*60+m;
    breakTasks.filter(b=>b._breakAt<=startMin&&!scheduled.find(s=>s.id===b.id))
      .forEach(b=>breakScheduled.push(b));
    breakScheduled.push(t);
    const dur=parseInt(t.duration)||0;
    m+=dur;h+=Math.floor(m/60);m=m%60;
    [h,m]=roundUp10(h,m);
  });
  breakTasks.filter(b=>!scheduled.find(s=>s.id===b.id)).forEach(b=>breakScheduled.push(b));
  tasks=[...breakScheduled,...others];
  sv(TKEY,tasks);
}

// ── 退勤時AIサマリ生成（レベル3：自律的なF条件アクション）
async function generateCheckoutSummary(){
  const done=tasks.filter(t=>t.status==='done');
  const recs=records.filter(r=>!r.isSystem&&!r.isLog);
  if(!done.length&&!recs.length)return;

  const doneLines=done.map(t=>{
    const info=_taskInfo[t.id]||{};
    return '✓ '+t.name+(info.output?' → '+info.output:'')+(info.client?' ['+info.client+']':'');
  }).join('\n');
  const recLines=recs.slice(-10).map(r=>'['+timeOnly(r.timestamp)+'] '+r.taskName+(r.userMemo?': '+r.userMemo.slice(0,30):'')).join('\n');
  const active=tasks.filter(t=>t.status==='active'&&!t._autoBreak);

  const prompt='今日の業務を振り返り日報サマリを作成してください。\n\n【完了タスク】\n'+(doneLines||'なし')+'\n\n【記録ログ（抜粋）】\n'+(recLines||'なし')+'\n\n【未完了】\n'+(active.map(t=>t.name).join('、')||'なし')+'\n\n以下のJSON形式で返してください:\n{"summary":"本日の成果（2〜3文）","good":"よかった点","improvement":"改善点・明日への学び","handover":"明日の引き継ぎ事項"}\nJSONのみ。';

  try{
    const session=await getGeminiSession();
    if(!session)return;
    const result=await session.prompt(prompt);
    session.destroy?.();
    const json=JSON.parse(result.replace(/```json|```/g,'').match(/\{[\s\S]*\}/)?.[0]||'{}');
    if(!json.summary)return;

    // サマリをモーダルで表示
    const summaryText=['# 業務サマリ '+todayKey(),'','## 本日の成果',json.summary||'','','## よかった点',json.good||'','','## 改善点・学び',json.improvement||'','','## 明日の引き継ぎ',json.handover||'','','---','完了: '+done.length+'件 / 記録: '+recs.length+'件'].join('\n');

    // サマリテキストをglobalに保存してonclickの引数問題を回避
    _lastSummaryText=summaryText;
    document.getElementById('modal-content').innerHTML=`
      <h3>📋 退勤サマリ（AI自動生成）</h3>
      <div class="summary-box">${esc(summaryText)}</div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-primary" onclick="saveSummaryFile()">📄 Markdownで保存</button>
        <button class="modal-btn" style="background:#EEF0FF;color:#5A5FBE;border:1px solid #C8C5F0" onclick="copySummary()">📋 コピー</button>
        <button class="modal-btn modal-btn-close" onclick="closeModal()">閉じる</button>
      </div>`;
    openModal();
  }catch(e){console.warn('退勤サマリ生成失敗:',e);}
}

async function saveSummaryFile(){
  const text=_lastSummaryText;
  if(!text){alert('サマリがありません。');return;}

function parseTaskLine(raw){
  // 箇条書き記号を除去（・- * • ◆ ◇ ▶ など）
  let name=raw.replace(/^[・\-\*•◆◇▶▷➤→►＊※]\s*/,'').trim();
  // 日時パターンを解析：MTG 6/22 9:00-10:00 / 会議 2026/6/22 / 打合せ 来週月曜
  let scheduleDate=null, scheduleTime=null, duration=30;

  // パターン0: HH:MM-HH:MM タスク名 または HH:MM タスク名 [分]
  const timeOnlyRange=/^(\d{1,2}):(\d{2})(?:\s*[-〜~]\s*(\d{1,2}):(\d{2}))?\s+/;
  const m0=name.match(timeOnlyRange);
  if(m0){
    scheduleTime=`${m0[1].padStart(2,'0')}:${m0[2]}`;
    scheduleDate=todayKey(); // 当日タスク
    if(m0[3]&&m0[4]){
      // HH:MM-HH:MM 形式：差分から所要時間を計算
      const sh=parseInt(m0[1]),sm=parseInt(m0[2]),eh=parseInt(m0[3]),em=parseInt(m0[4]);
      duration=Math.max(10,(eh*60+em)-(sh*60+sm));
    }
    // タスク名から時刻部分を除去
    name=name.replace(timeOnlyRange,'').trim();
    // 末尾の数字を所要時間として解釈（例：「朝会 30」→ 30分）
    if(!m0[3]){
      const trailNum=name.match(/\s+(\d+)\s*$/);
      if(trailNum){
        duration=parseInt(trailNum[1]);
        name=name.replace(/\s+\d+\s*$/,'').trim();
      }
    }
  }

  // パターン1: M/D HH:MM-HH:MM or M/D HH:MM
  const mdTimeRange=/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})(?:\s*[-〜~]\s*(\d{1,2}):(\d{2}))?/;
  const m1=!m0&&name.match(mdTimeRange);
  if(m1){
    const today=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Tokyo'}));
    const year=today.getFullYear();
    const mo=m1[1].padStart(2,'0'), da=m1[2].padStart(2,'0');
    scheduleDate=`${year}-${mo}-${da}`;
    scheduleTime=`${m1[3].padStart(2,'0')}:${m1[4]}`;
    if(m1[5]&&m1[6]){
      const sh=parseInt(m1[3]),sm=parseInt(m1[4]),eh=parseInt(m1[5]),em=parseInt(m1[6]);
      duration=Math.max(10,(eh*60+em)-(sh*60+sm));
    }
  }
  // パターン2: YYYY/M/D or YYYY-M-D
  if(!scheduleDate){
    const fullDate=/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/;
    const m2=name.match(fullDate);
    if(m2) scheduleDate=`${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
  }
  // パターン3: 相対指定（明日・来週月曜など）
  if(!scheduleDate){
    const today2=todayKey();
    if(/明日/.test(name)) scheduleDate=addDays(today2,1);
    else if(/明後日/.test(name)) scheduleDate=addDays(today2,2);
    else if(/来週月曜/.test(name)) scheduleDate=nextMonday(today2);
    else if(/来週/.test(name)) scheduleDate=addDays(today2,7);
    else if(/来月/.test(name)){
      const d=new Date(today2+'T00:00:00');d.setMonth(d.getMonth()+1);
      const p=n=>String(n).padStart(2,'0');
      scheduleDate=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    }
    // 曜日指定（今週金曜 など）
    const days=['日','月','火','水','木','金','土'];
    const dayMatch=name.match(/(?:今週|次の)?([月火水木金土])曜/);
    if(dayMatch){
      const targetDay=days.indexOf(dayMatch[1]);
      if(targetDay>=0){
        const d=new Date(today2+'T00:00:00');
        let diff=(targetDay-d.getDay()+7)%7||7;
        d.setDate(d.getDate()+diff);
        const p=n=>String(n).padStart(2,'0');
        scheduleDate=`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
      }
    }
  }
  // タスク名から日時文字列を除去（残す場合もあるのでオプション）
  // 今日以降の将来日付かチェック
  const isToday=scheduleDate===todayKey();
  const isFuture=scheduleDate&&scheduleDate>todayKey();
  return {name, scheduleDate, scheduleTime, duration, isToday, isFuture};
}

function addTasks(){
  const ta=document.getElementById('bulk-input');
  const rawText=ta.value;
  if(!rawText.trim())return;
  const forceDuration=parseInt(document.getElementById('bulk-duration')?.value||'')||null;
  const forceStartTime=document.getElementById('bulk-start-time')?.value||null;
  const insertPos=document.getElementById('bulk-insert-pos')?.value||'bottom';

  // ラベル行の解析（「明日リスケタスク：」「本日対応：」「来週：」など）
  // 「〇〇:」または「〇〇：」で終わる行をラベルとして認識
  const lines=rawText.split(/\r\n|\r|\n/).map(l=>l.trim()).filter(l=>l.length>0);
  const base=Date.now();
  let added=0, future=0;

  // ラベルコンテキストを解析
  let labelContext=null; // {type:'reschedule'|'future'|'active', date:null}
  const RESCHEDULE_LABELS=['リスケ','reschedule','明日','来週','後日','先送り'];
  const FUTURE_LABELS=['予定','future','来月','翌週'];
  const TODAY_LABELS=['本日','今日','対応中','active','即対応'];

  lines.forEach((raw,i)=>{
    // ラベル行の判定（末尾が：または:）
    const labelMatch=raw.match(/^(.+)[：:]\s*$/);
    if(labelMatch){
      const label=labelMatch[1];
      if(RESCHEDULE_LABELS.some(k=>label.includes(k))){
        // 日付解析を試みる
        const dateInLabel=parseTaskLine(label);
        labelContext={type:'reschedule', date:dateInLabel.scheduleDate||addDays(todayKey(),1)};
      } else if(FUTURE_LABELS.some(k=>label.includes(k))){
        const dateInLabel=parseTaskLine(label);
        labelContext={type:'future', date:dateInLabel.scheduleDate||addDays(todayKey(),7)};
      } else if(TODAY_LABELS.some(k=>label.includes(k))){
        labelContext={type:'active', date:null};
      } else {
        // 不明なラベル → コンテキストをリセット
        labelContext=null;
      }
      return; // ラベル行自体はタスクとして追加しない
    }

    const parsed=parseTaskLine(raw);
    const id=base+i;

    // ラベルコンテキストによるステータス上書き
    let forcedStatus=null, forcedDate=null;
    if(labelContext){
      forcedStatus=labelContext.type;
      forcedDate=labelContext.date;
    }

    const effectiveStatus=forcedStatus||(parsed.isFuture?'future':null);
    const effectiveDate=forcedDate||parsed.scheduleDate;

    if(effectiveStatus==='future'||effectiveStatus==='reschedule'){
      tasks.push({id,name:parsed.name,
        status:effectiveStatus,
        duration:parsed.duration,
        rescheduleDate:effectiveDate,
        _scheduleTime:parsed.scheduleTime});
      if(effectiveStatus==='future') future++;
    } else {
      const dup=tasks.find(x=>x.name===parsed.name&&['active','reschedule','future'].includes(x.status));
      if(dup){
        const statusLabel={'active':'対応中','reschedule':'リスケ','future':'予定'}[dup.status]||dup.status;
        if(!confirm('「'+parsed.name+'」は既に'+statusLabel+'セクションにあります。\n重複して追加しますか？'))return;
      }
      const task={id,name:parsed.name,status:'active',duration:forceDuration||parsed.duration};
      if(forceStartTime){task._startOverride=forceStartTime;task._hasFixedTime=true;}
      else if(parsed.scheduleTime){task._startOverride=parsed.scheduleTime;task._hasFixedTime=true;}
      // 時刻指定なしタスクは対応中セクションの先頭に挿入
      // （時刻指定ありタスクは末尾に追加してcalcで時刻順に並ぶ）
      if(!task._hasFixedTime){
        const firstActive=tasks.findIndex(x=>x.status==='active');
        if(firstActive>=0){tasks.splice(firstActive,0,task);added++;return;}
      }
      tasks.push(task);
    }
    added++;
  });
  sv(TKEY,tasks);ta.value='';
  const hint=document.getElementById('add-hint');
  if(hint&&added>0){
    const msg=future>0?`✓ ${added}件追加（うち予定: ${future}件）`:`✓ ${added}件追加`;
    hint.textContent=msg;hint.style.display='block';
    setTimeout(()=>hint.style.display='none',2500);
  }
  renderTasks();
}

// ── 所要時間変更時の再スケジュール
function onDurationChange(id, val){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const dur=parseInt(val);if(isNaN(dur)||dur<1)return;
  t.duration=dur;
  // 時刻指定なしタスクのみ再計算（完了時と同じルール）
  if(attend.inTime&&!attend.outTime){
    let baseMin=null;
    const doneTask=[...tasks].filter(t=>t.status==='done'&&t.doneAt).pop();
    if(doneTask) baseMin=_toMin(timeOnly(doneTask.doneAt));
    else if(attend.inTime) baseMin=_toMin(timeOnly(attend.inTime));
    if(baseMin!=null){
      let [h,m]=[Math.floor(baseMin/60),baseMin%60];
      m=Math.ceil(m/10)*10; h+=Math.floor(m/60); m=m%60;
      tasks.filter(tt=>tt.status==='active'&&!tt._autoBreak&&!tt._startOverride&&!tt._hasFixedTime).forEach(tt=>{
        tt._startOverride=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
        const d2=parseInt(tt.duration)||30;
        let eh=h,em=m+d2; eh+=Math.floor(em/60); em=em%60;
        m=Math.ceil(em/10)*10; h=eh+Math.floor(m/60); m=m%60;
      });
      reinsertBreaks();
    }
  }
  sv(TKEY,tasks);calcScheduledTimes(_schedBase);renderTasks();
}

    items+=`<button class="task-menu-item" onmousedown="${doAction(`changeStatus(${id},'reschedule')`)}">↺ リスケ</button>`;
    items+=`<button class="task-menu-item red" onmousedown="${doAction(`changeStatus(${id},'omit')`)}">— オミット</button>`;
    items+=`<button class="task-menu-item" onmousedown="${doAction(`duplicateTask(${id})`)}">⧉ 複製</button>`;
  } else if(isOmit){
    // オミットセクション：対応中へ戻す・複製のみ（削除はタスク行に直接表示）
    items+=`<button class="task-menu-item" onmousedown="${doAction(`changeStatus(${id},'active')`)}">▶ 対応中へ</button>`;
    items+=`<button class="task-menu-item" onmousedown="${doAction(`duplicateTask(${id})`)}">⧉ 複製</button>`;
  } else {
    // 完了・リスケ・予定セクション
    items+=`<button class="task-menu-item" onmousedown="${doAction(`changeStatus(${id},'active')`)}">▶ 対応中へ</button>`;
    items+=`<button class="task-menu-item" onmousedown="${doAction(`duplicateTask(${id})`)}">⧉ 複製</button>`;
    if(t.status!=='done') items+=`<button class="task-menu-item" onmousedown="${doAction(`changeStatus(${id},'done')`)}">✓ 完了</button>`;
    if(t.status!=='reschedule') items+=`<button class="task-menu-item" onmousedown="${doAction(`changeStatus(${id},'reschedule')`)}">↺ リスケ</button>`;
    items+=`<button class="task-menu-item red" onmousedown="${doAction(`changeStatus(${id},'omit')`)}">— オミット</button>`;
  }
  portal.innerHTML=items;

  // ボタンの位置を取得してportalを配置
  const rect=btnEl.getBoundingClientRect();
  const portalWidth=140;
  let left=rect.right-portalWidth;
  if(left<4)left=4;
  let top=rect.bottom+4;
  // 画面下にはみ出す場合は上に表示
  if(top+200>window.innerHeight) top=rect.top-204;

  portal.style.left=left+'px';
  portal.style.top=top+'px';
  portal.classList.add('open');
  _activeMenu=id;
}

// ── 中断・再開
function doResume(id, interruptOthers){
  closeModal();
  const t=tasks.find(t=>t.id===id);if(!t)return;
  if(interruptOthers){
    tasks.forEach(x=>{
      if(x.status==='active'&&x.started&&!x._interrupted&&x.id!==id&&!x._autoBreak){
        const tools=Array.isArray(_taskRecAiTool[x.id])?_taskRecAiTool[x.id]:
          (_taskRecAiTool[x.id]&&_taskRecAiTool[x.id]!=='none'?[_taskRecAiTool[x.id]]:[]);
        if(tools.length===0){
          x._interrupted=true;x._interruptedAt=getJST();
          pushRecord(x,'並走抑制による中断',undefined,{isLog:true});
        }
      }
    });
  }
  t._interrupted=false;t._interruptedAt=null;t.started=true;
  t.startedAt=t.startedAt||getJST();
  const idx=tasks.findIndex(x=>x.id===id);
  const newFirst=tasks.findIndex(x=>x.status==='active'&&!x._autoBreak);
  if(idx>=0&&newFirst>=0&&idx!==newFirst){tasks.splice(idx,1);tasks.splice(newFirst,0,t);}
  pushRecord(t,'再開',undefined,{isLog:true});
  sv(TKEY,tasks);renderTasks();
}

function interruptTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  if(t._interrupted){
    // 再開前に並走チェック
    const running=tasks.filter(x=>x.status==='active'&&x.started&&!x._interrupted&&x.id!==id&&!x._autoBreak);
    if(running.length>0){
      const nonAi=running.filter(x=>{
        const tools=Array.isArray(_taskRecAiTool[x.id])?_taskRecAiTool[x.id]:
          (_taskRecAiTool[x.id]&&_taskRecAiTool[x.id]!=='none'?[_taskRecAiTool[x.id]]:[]);
        return tools.length===0;
      });
      if(nonAi.length>0){
        const names=nonAi.map(x=>x.name).join('、');
        document.getElementById('modal-content').innerHTML=`
          <h3>⚠️ 並走の確認</h3>
          <p style="font-size:13px;color:#444;margin-bottom:12px">
            「${esc(t.name)}」を再開しますが、<br>
            <strong>${esc(names)}</strong><br>が進行中です。どうしますか？
          </p>
          <div class="modal-btns">
            <button class="modal-btn modal-btn-primary" onclick="doResume(${id},true)">⏸ 進行中を中断して再開</button>
            <button class="modal-btn" style="background:#FFF8EC;color:#B46B00;border:1px solid #F5D38A"
              onclick="doResume(${id},false)">並走して再開（AI稼働中）</button>
            <button class="modal-btn modal-btn-close" onclick="closeModal()">キャンセル</button>
          </div>`;
        openModal();return;
      }
    }
    doResume(id,false);return;
  } else {
    t._interrupted=true;
    t._interruptedAt=getJST();
    pushRecord(t,'中断',undefined,{isLog:true});
  }
  sv(TKEY,tasks);renderTasks();
}

// ── 並走トグル
function toggleParallel(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  t.parallel=!t.parallel;
  sv(TKEY,tasks);renderTasks();
}

// ── 着手
function toggleStart(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  if(t.started){
    t.started=false;
    delete t._startOverride;
    // 着手中が1件以下になったら並走解除
    const stillStarted=tasks.filter(x=>x.status==='active'&&x.started&&x.id!==id);
    if(stillStarted.length<=0){
      tasks.forEach(x=>x.parallel=false);
    }
    calcScheduledTimes(_schedBase);
    sv(TKEY,tasks);renderTasks();
    return;
  }
  // _pendingTime がセットされていればモーダル、なければ即着手
  if(_pendingTime){
    showStartTimeModal(id);
  } else {
    confirmStart(id, timeOnly(getJST()));
  }
}

  const nowHHMM=_pendingTime||timeOnly(getJST());
  const t=tasks.find(t=>t.id===id);if(!t)return;
  document.getElementById('modal-content').innerHTML=`

    <p style="font-size:13px;color:#444;margin-bottom:10px">「${esc(t.name)}」の開始時刻を確認してください。</p>

function confirmStart(id,timeValArg){
  const nowHHMM=timeValArg||document.getElementById('start-time-input')?.value||timeOnly(getJST());
  if(!timeValArg)closeModal();
  const t=tasks.find(t=>t.id===id);if(!t)return;
  // 並走チェック：着手中タスクがあり、AI非稼働の場合は確認モーダル
  // 中断中タスクは「進行中」ではないので除外
  const alreadyStarted=tasks.filter(x=>x.status==='active'&&x.started&&!x._interrupted&&x.id!==id&&!x._autoBreak);
  if(alreadyStarted.length>0){
    const nonAiRunning=alreadyStarted.filter(x=>{
      const tools=Array.isArray(_taskRecAiTool[x.id])?_taskRecAiTool[x.id]:
        (_taskRecAiTool[x.id]&&_taskRecAiTool[x.id]!=='none'?[_taskRecAiTool[x.id]]:[]);
      return tools.length===0;
    });
    if(nonAiRunning.length>0){
      const names=nonAiRunning.map(x=>x.name).join('、');
      document.getElementById('modal-content').innerHTML=`
        <h3>⚠️ 並走の確認</h3>
        <p style="font-size:13px;color:#444;margin-bottom:12px">
          「${esc(t.name)}」を着手しますが、<br>
          <strong>${esc(names)}</strong><br>
          が進行中です。どうしますか？
        </p>
        <div class="modal-btns">
          <button class="modal-btn modal-btn-primary" onclick="interruptAndStart(${id},'${nowHHMM}')">⏸ 進行中を中断して着手</button>
          <button class="modal-btn" style="background:#FFF8EC;color:#B46B00;border:1px solid #F5D38A"
            onclick="startParallel(${id},'${nowHHMM}')">並走して着手（AI稼働中）</button>
          <button class="modal-btn modal-btn-close" onclick="closeModal()">キャンセル</button>
        </div>`;
      openModal();return;
    }
  }
  _applyStart(id,nowHHMM);
}

  if(_modalVoiceRecog)_modalVoiceRecog.stop();

// ── ステータス変更
function changeStatus(id,newStatus,extraOpts={}){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const prevStatus=t.status;

  // モーダルが必要なケース → 早期リターン
  if(newStatus==='reschedule'){
    // リスケ先の日時確認モーダルを表示（statusはまだ変更しない）
    reschedulePickState[id]={mode:null,date:''};
    showRescheduleConfirmModal(id);
    return;
  }
  if(newStatus==='omit'){
    showOmitReasonModal(id);return;
  }
  if(newStatus==='done'){
    showDoneModal(id);return;
  }

  // __done_confirmed__: confirmDone()から呼ばれる完了の実処理
  const now=getJST();
  const startedAt=t.startedAt||null;

  if(newStatus==='__done_confirmed__'){
    const doneTime=_pendingTime?todayKey()+' '+_pendingTime:now;
    _pendingTime=null;
    t.status='done';
    t.doneAt=doneTime;
    t.started=false;
    t.parallel=false;
    const durMin=startedAt
      ?Math.round((new Date(doneTime.replace(' ','T'))-new Date(startedAt.replace(' ','T')))/60000)
      :null;
    pushRecord(t, memos[id]||'', 'done', {
      startedAt: startedAt||taskStartTime[id]||null,
      endedAt:   doneTime,
      durationMin: durMin,
      aiTool:  extraOpts.aiTool||null,
      aiMemo:  extraOpts.aiMemo||null,
    });
    memos[id]='';
    // 並走解除チェック
    const stillStarted=tasks.filter(x=>x.status==='active'&&x.started);
    if(stillStarted.length<=1) tasks.forEach(x=>x.parallel=false);

  } else {
    // 対応中へ戻す・その他ステータス変更
    if(t.started){t.started=false;}
    t.parallel=false;
    t.status=newStatus;
    if(newStatus==='active'){
      const wasDone=(prevStatus==='done');
      delete t.doneAt;delete t.rescheduleDate;delete reschedulePickState[id];
      // 完了から対応中へ戻したタスクは中断中扱いにして再開ボタンを表示
      if(wasDone){ t._interrupted=true; t._interruptedAt=getJST(); }
    }
    pushRecord(t,`ステータス変更: ${STATUS[newStatus]?.label||newStatus}`,newStatus,{isLog:true});
  }

  // 完了時：時刻指定なしタスクのスケジュールを完了時刻から再計算
  const justDone=tasks.find(t=>t.status==='done'&&t.doneAt&&t.id===Number(id));
  if(justDone&&attend.inTime&&!attend.outTime){
    const doneTimeStr=timeOnly(justDone.doneAt);
    let [h,m]=doneTimeStr.split(':').map(Number);
    m=Math.ceil(m/10)*10; h+=Math.floor(m/60); m=m%60;
    tasks.filter(t=>t.status==='active'&&!t._autoBreak&&!t._startOverride).forEach(t=>{
      t._startOverride=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      const dur=parseInt(t.duration)||30;
      let eh=h,em=m+dur; eh+=Math.floor(em/60); em=em%60;
      m=Math.ceil(em/10)*10; h=eh+Math.floor(m/60); m=m%60;
    });
    reinsertBreaks();
  }
  sv(TKEY,tasks);activeExpd=null;
  renderTasks();
}
function applyReschedule(id){
  const t=tasks.find(t=>t.id===id);const s=reschedulePickState[id];if(!t||!s)return;
  let date='';
  if(s.mode==='tomorrow')date=addDays(todayKey(),1);
  else if(s.mode==='nextweek')date=nextMonday(todayKey());
  else if(s.mode==='custom')date=s.date||'';
  const elapsed=t.started&&t.startedAt?`着手 ${timeOnly(t.startedAt)} 〜 ${timeOnly(getJST())}`:'';
  t.status='reschedule';t.rescheduleDate=date;t.started=false;
  delete reschedulePickState[id];
  pushRecord(t,(elapsed?elapsed+'\n':'')+'リスケ'+(date?' → '+date:''),'reschedule',{isLog:true});
  sv(TKEY,tasks);activeExpd=null;renderTasks();
}
function setRescheduleMode(id,mode){if(!reschedulePickState[id])reschedulePickState[id]={mode,date:''};else reschedulePickState[id].mode=mode;renderTasks();}
function setRescheduleDate(id,v){
  if(!reschedulePickState[id])reschedulePickState[id]={mode:'custom',date:v};else{reschedulePickState[id].date=v;reschedulePickState[id].mode='custom';}
  // モーダルが開いている場合はモーダル内で完結させる（renderTasksでモーダルを消さない）
  if(document.getElementById('resc-modal-btns')) return;
  renderTasks();
}

// ── タスク複製（完了/リスケ/オミット → 対応中に新規追加）
function duplicateTask(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const baseName=t.name.replace(/ #\d+$/,'');
  const existing=tasks.filter(x=>x.status==='active'&&x.name.startsWith(baseName));
  const newName=existing.length>0?`${baseName} #${existing.length+1}`:baseName;
  const newId=Date.now();

  // 新タスクを作成（記録・情報込み）
  const newTask={
    id:newId, name:newName, status:'active',
    duration:t.duration||30,
    startedAt:null, started:false,
    _startOverride:null,
  };

  // 元タスクの記録を複製（タスクIDを新IDに付け替え）
  const origRecs=records.filter(r=>r.taskId===id);
  const ts=getJST();
  origRecs.forEach((r,i)=>{
    records.push({...r,
      id:newId*100+i+1,
      taskId:newId,
      taskName:newName,
      timestamp:ts,
      memo:(r.memo||'')+'【複製】',
      userMemo:(r.userMemo||r.memo||'')+'【複製】',
      sysLog:r.sysLog||'',
    });
  });

  // タスク情報（依頼元・成果物・背景）も複製
  if(_taskInfo[id]){
    _taskInfo[newId]={..._taskInfo[id]};
    sv('tlH4-taskinfo',_taskInfo);
  }

  // 対応中の先頭に挿入（autoBreakより前）
  const firstActiveIdx=tasks.findIndex(x=>x.status==='active'&&!x._autoBreak);
  if(firstActiveIdx>=0){
    tasks.splice(firstActiveIdx,0,newTask);
  } else {
    tasks.push(newTask);
  }

  const all=ld(RKEY,{});all[todayKey()]=records;sv(RKEY,all);
  sv(TKEY,tasks);updateBadge();
  calcScheduledTimes(_schedBase);
  renderTasks();
}


// ── 添付ファイル管理
function handleAttachFile(taskId, input){
  const files=input.files;if(!files||!files.length)return;
  if(!_attachments[taskId])_attachments[taskId]=[];
  Array.from(files).forEach(file=>{
    // 5MB上限チェック
    if(file.size>5*1024*1024){alert(`${file.name} は5MBを超えています。スキップします。`);return;}
    const reader=new FileReader();
    reader.onload=e=>{
      _attachments[taskId].push({id:_nextId(),name:file.name,type:file.type,dataUrl:e.target.result});
      refreshExpandArea(taskId);
    };
    reader.readAsDataURL(file);
  });
}
function deleteAttachment(taskId,attachId){
  if(!_attachments[taskId])return;
  _attachments[taskId]=_attachments[taskId].filter(a=>a.id!==attachId);
  refreshExpandArea(taskId);
}
function attachmentHTML(taskId){
  const list=_attachments[taskId]||[];
  if(!list.length)return '';
  return '<div class="attach-wrap">'+list.map(a=>{
    const isImg=a.type.startsWith('image/');
    const isVid=a.type.startsWith('video/');
    if(isImg) return `<div class="attach-item"><img class="attach-thumb" src="${a.dataUrl}" onclick="window.open('${a.dataUrl}')" title="${esc(a.name)}"><button class="attach-del" onclick="deleteAttachment(${taskId},${a.id})">×</button></div>`;
    if(isVid) return `<div class="attach-item"><video class="attach-thumb" src="${a.dataUrl}" controls></video><button class="attach-del" onclick="deleteAttachment(${taskId},${a.id})">×</button></div>`;
    return `<div class="attach-item"><span class="attach-file" onclick="window.open('${a.dataUrl}')" title="${esc(a.name)}">📎 ${esc(a.name.length>15?a.name.slice(0,15)+'…':a.name)}</span><button class="attach-del" onclick="deleteAttachment(${taskId},${a.id})">×</button></div>`;
  }).join('')+'</div>';
}

let _recIdSeq=0;
function pushRecord(task, memo, statusOverride, opts={}){
  // opts: { isLog, startedAt, endedAt, durationMin, aiTool, aiMemo }
  // isLog=true → sysLog（内部ログ）、false → userMemo（ユーザー入力）
  const ts=getJST();
  if(!taskStartTime[task.id])taskStartTime[task.id]=ts;
  const rid=Date.now()*100+(++_recIdSeq%100);
  const status=statusOverride!==undefined?statusOverride:task.status;
  const isLog=opts.isLog||false;
  records.push({
    id:rid, taskId:task.id, taskName:task.name,
    timestamp:ts,
    memo:memo||'',        // 後方互換
    userMemo:isLog?'':(memo||''),   // ユーザー入力メモ
    sysLog:isLog?(memo||''):'',     // 内部ログ
    status,
    isLog,
    startedAt:opts.startedAt||null,
    endedAt:opts.endedAt||null,
    durationMin:opts.durationMin||null,
    aiTool:opts.aiTool||null,
    aiMemo:opts.aiMemo||null,
    attachments:opts.attachments||null,
  });
  const all=ld(RKEY,{});all[todayKey()]=records;sv(RKEY,all);updateBadge();
  if(document.getElementById('v-log')&&document.getElementById('v-log').style.display!=='none')renderLog();
}

// ── スケジュール再引き（現在時刻ベース）
let _schedBase=null; // null=出勤時刻ベース、文字列=指定時刻ベース
async function aiSortTasks(){
  // Gemini Nano 利用可否チェック（APIキー不要）
  const activeTasks=tasks.filter(t=>t.status==='active'&&!t._autoBreak);
  const breakTasks=tasks.filter(t=>t.status==='active'&&t._autoBreak);
  if(activeTasks.length<2){alert('並び替えるタスクが2件以上必要です。');return;}
  const btn=document.querySelector('[onclick="aiSortTasks()"]');
  if(btn){btn.textContent='⏳ 提案中…';btn.disabled=true;}
  const taskLines=activeTasks.map((t,i)=>(i+1)+'. '+t.name+' ('+( t.duration||30)+'分)');
  const taskList=taskLines.join('\n');
  const breakItems=breakTasks.map(b=>b.name+': '+(b.scheduledStart||'')+'頃');
  const breakInfo=breakItems.join(', ');
  const promptText='あなたは業務効率の専門家です。以下のタスクを「優先度・緊急度・集中力が必要か」の観点で最適な実行順に並び替えてください。\n\n【タスク一覧】\n'+taskList+'\n\n【ルール】\n- 緊急・締め切りがあるものを優先\n- 集中力が必要な作業は午前中に配置\n- 単純作業は後半に\n- 番号の順序を変えて最適化すること（昇順にするだけでは不可）\n'+(breakInfo?'【休憩】'+breakInfo+'\n':'')+'\n【出力形式】並び替えた番号のみJSON配列で返す。例: [3,1,4,2]\n説明文は不要。JSONのみ。';
  try{
      const session=await getGeminiSession();
    if(!session) throw new Error('Gemini Nano が利用できません');
    const text=await session.prompt(promptText);
    session.destroy?.();
    const order=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(!Array.isArray(order))throw new Error('Invalid response');
    const newOrder=order.map(n=>activeTasks[n-1]).filter(Boolean);
    const preview=newOrder.map((t,i)=>(i+1)+'. '+t.name).join('\n');
    if(confirm('AIの並び替え提案:\n\n'+preview+'\n\nこの順番に変更しますか？')){
      const others=tasks.filter(t=>t.status!=='active');
      // 非固定タスクの_startOverrideをクリアして時刻を再割り当て
      newOrder.forEach(t=>{ if(!_isTimeLocked(t)) delete t._startOverride; });
      tasks=[...newOrder,...breakTasks,...others];
      _reorderByTime();
      sv(TKEY,tasks);calcScheduledTimes(_schedBase);renderTasks();
    }
  }catch(e){alert('AI並び替えに失敗しました: '+e.message);}
  finally{if(btn){btn.textContent='✨ AI並び替え';btn.disabled=false;}}
}

function rescheduleFromNow(){
  const nowStr=getJST();
  _schedBase=nowStr;

  // 非固定タスク（時刻指定なし・未着手・非休憩）の_startOverrideをクリア
  // → calcScheduledTimesが現在時刻から連続配置する
  tasks.filter(t=>t.status==='active'&&!_isTimeLocked(t))
    .forEach(t=>delete t._startOverride);

  // 全activeタスクを時刻順に並べ直す（固定タスクのアンカー位置を尊重）
  _reorderByTime();

  calcScheduledTimes(nowStr);
  sv(TKEY,tasks);
  renderTasks();
}

// ── 全activeタスクを時刻順に整列
// 固定タスク（_startOverride持ち）は時刻順、非固定タスクは相対順序を保持して
// 固定タスクの間の適切な時刻位置に挿入する
function _reorderByTime(){
  const active=tasks.filter(t=>t.status==='active');
  const others=tasks.filter(t=>t.status!=='active');
  // 各タスクにソート用の時刻を付与（固定は_startOverride、非固定はscheduledStart）
  const withKey=active.map((t,idx)=>({
    t, idx,
    min: (t._startOverride ? _toMin(t._startOverride)
          : (t.scheduledStart ? _toMin(t.scheduledStart) : 9999))
  }));
  // 時刻順、同時刻は元の順序を保持（安定ソート）
  withKey.sort((a,b)=> a.min!==b.min ? a.min-b.min : a.idx-b.idx);
  tasks=[...withKey.map(x=>x.t),...others];
}

async function aiSuggestTaskInfo(id){

  if(btn){btn.textContent='⏳';btn.disabled=true;}

    const b=document.querySelector(`[onclick="aiSuggestTaskInfo(${id})"]`);
    if(b){b.textContent='✨ AI補完';b.disabled=false;}
  }
  if(btn){btn.textContent='✨ AI補完';btn.disabled=false;}
}

// ── Gemini Nano ユーティリティ
async function getGeminiSession(){
  // window.ai (旧API) または window.LanguageModel (新API) を試みる
  if(window.LanguageModel){
    try{
      const avail=await window.LanguageModel.availability();
      if(avail==='available'||avail==='downloadable'){
        return await window.LanguageModel.create();
      }
    }catch(e){console.warn('LanguageModel API error:',e);}
  }
  if(window.ai?.languageModel){
    try{
      const cap=await window.ai.languageModel.capabilities();
      if(cap.available!=='no'){
        return await window.ai.languageModel.create();
      }
    }catch(e){console.warn('ai.languageModel error:',e);}
  }
  return null;
}
async function checkGeminiAvailable(){
  const s=await getGeminiSession().catch(()=>null);
  if(s){s.destroy?.();return true;}
  return false;
}
